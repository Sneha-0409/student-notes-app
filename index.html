<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Notes App</h1>

        <div class="input-area">
            <textarea id="noteInput" placeholder="Write your note here..."></textarea>
            <div class="input-actions">
                <input type="date" id="dueDateInput" title="Set a due date">
                <button onclick="addNote()">Add Note</button>
            </div>
        </div>

        <div class="view-controls">
            <button id="toggleViewBtn" onclick="toggleView()" class="secondary-btn">Switch to Board View</button>
        </div>

        <div id="notesContainer"></div>

        <div id="kanbanBoard" class="hidden">
            <div class="kanban-column" id="todo" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>To Do</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="doing" data-status="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Doing</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Done</h2>
                <div class="kanban-content"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
