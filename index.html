<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
        <h1>Student Notes</h1>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-icon theme-icon--sun">☀️</span>
          <span class="theme-icon theme-icon--moon" style="display:none">🌙</span>
        </button>
    </header>

    <main class="main-content">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>Folders</h3>
          <div id="foldersTree"></div>
          <div class="sidebar-input-group">
            <input id="newFolderName" placeholder="New folder..." />
            <button id="addFolderBtn" type="button">+</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>Subjects</h3>
          <div id="subjectsList"></div>
          <div class="sidebar-input-group">
            <input id="newSubjectName" placeholder="New subject..." />
            <input id="newSubjectColor" type="color" value="#3b82f6" title="Pick color" />
            <button id="addSubjectBtn" type="button">+</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>Attendance</h3>
          <div id="attendancePanel" class="attendance-panel">
            <select id="attendanceSubject">
              <option value="">Subject</option>
            </select>
            <div class="sidebar-input-group">
              <button id="markPresentBtn" type="button" class="btn-small">Present</button>
              <button id="markAbsentBtn" type="button" class="btn-small btn-danger">Absent</button>
            </div>
          </div>
        </div>
      </aside>


      <div class="content-area">
        <section class="editor-section">
          <input id="noteTitle" class="title-input" placeholder="Note Title (optional)" />
          <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
          
          <div class="input-grid">
            <input id="noteTags" placeholder="Tags (e.g. exam, lab)" />
            <input id="noteSubject" placeholder="Subject" />
            <select id="noteFolder">
              <option value="">No folder</option>

      <div class="input-area">
        <input id="noteTitle" placeholder="Title (optional)" />
        <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
        <div class="input-row">
          <input id="noteTags" placeholder="Tags (comma separated)" />
          <input id="noteSubject" placeholder="Subject / Category (optional)" />
          <select id="noteFolder" aria-label="Folder" title="Folder">
            <option value="">No folder</option>
          </select>
          <input id="noteDueDate" type="date" title="Due Date (optional)" />
        </div>
        <!-- Sections: minimal structured blocks inside a note -->
        <div id="sectionsArea" style="margin-top:10px">
          <label style="display:block; margin-bottom:6px; color:var(--muted-text-color)">Sections</label>
          <div id="sectionsList"></div>
          <div style="display:flex; gap:8px; margin-top:8px; align-items:center">
            <select id="newSectionType">
              <option value="lecture">Lecture</option>
              <option value="important">Important</option>
              <option value="formula">Formula / Reference</option>
              <option value="summary">Summary</option>

            </select>
          </div>

          <div class="editor-footer">
            <label><input type="checkbox" id="livePreviewToggle" /> Live preview</label>
            <button onclick="addNote()" class="primary-btn">Save Note</button>
          </div>

          <div id="livePreview" class="live-preview" style="display:none"></div>
        </section>

        <section class="search-section">
          <input id="searchInput" placeholder="Search notes..." />
          <select id="sortOrder" onchange="sortNotes()">
            <option value="" selected disabled>Sort by</option>
            <option value="asc">A-Z</option>
            <option value="desc">Z-A</option>
          </select>
          <label class="archive-filter">
            <input type="checkbox" id="showArchived" onchange="displayNotes()"> 
            Show Archived
          </label>
        </section>

        <div id="notesContainer" class="notes-grid"></div>
      </div>
    </main>

      </section>
    </main>

        <div class="view-controls">
            <button id="toggleViewBtn" onclick="toggleView()" class="secondary-btn">Switch to Board View</button>
        </div>

        <div id="notesContainer"></div>

        <div id="kanbanBoard" class="hidden">
            <div class="kanban-column" id="todo" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>To Do</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="doing" data-status="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Doing</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Done</h2>
                <div class="kanban-content"></div>
            </div>
        </div>
    </div>
    <div class="view-controls" style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
        <button id="toggleViewBtn" onclick="toggleView()" class="secondary-btn" style="padding: 8px 16px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer;">Switch to Board View</button>
    </div>

    <div id="notesContainer"></div>

    <div id="kanbanBoard" class="hidden" style="display: none; gap: 20px; margin-top: 20px;">
        <div class="kanban-column" id="todo" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
            <h2>To Do</h2>
            <div class="kanban-content"></div>
        </div>
        <div class="kanban-column" id="doing" data-status="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
            <h2>Doing</h2>
            <div class="kanban-content"></div>
        </div>
        <div class="kanban-column" id="done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
            <h2>Done</h2>
            <div class="kanban-content"></div>
        </div>
    </div>
  
    <section id="pinnedSection" class="pinned-section" aria-labelledby="pinnedHeading" style="display:none">
      <h2 id="pinnedHeading">Pinned Notes</h2>
      <div id="pinnedContainer"></div>
    </section>
    <section id="favoritesSection" class="favorites-section" aria-labelledby="favoritesHeading" style="display:none">
      <h2 id="favoritesHeading">Favorites</h2>
      <div id="favoritesContainer"></div>
    </section>
      <!-- Minimal Recent History: shows recently opened or edited notes for quick access -->
      <section id="recentSection" class="recent-section" aria-labelledby="recentHeading" style="display:block">
        <h2 id="recentHeading">Recent</h2>
        <div id="recentContainer" class="recent-container"></div>
      </section>

  </div>

    <div id="toastContainer" class="toast-container"></div>
  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js"></script>
  <!-- Markdown renderer and sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

<script src="script.js"></script>
</body>
</html>
