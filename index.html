<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
        <h1>Student Notes</h1>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-icon theme-icon--sun">☀️</span>
          <span class="theme-icon theme-icon--moon" style="display:none">🌙</span>
        </button>
    </header>

    <main class="main-content">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>Folders</h3>
          <div id="foldersTree"></div>
          <div class="sidebar-input-group">
            <input id="newFolderName" placeholder="New folder..." />
            <button id="addFolderBtn" type="button">+</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>Subjects</h3>
          <div id="subjectsList"></div>
          <div class="sidebar-input-group">
            <input id="newSubjectName" placeholder="New subject..." />
            <input id="newSubjectColor" type="color" value="#3b82f6" title="Pick color" />
            <button id="addSubjectBtn" type="button">+</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>Attendance</h3>
          <div id="attendancePanel" class="attendance-panel">
            <select id="attendanceSubject">
              <option value="">Subject</option>
            </select>
            <div class="sidebar-input-group">
              <button id="markPresentBtn" type="button" class="btn-small">Present</button>
              <button id="markAbsentBtn" type="button" class="btn-small btn-danger">Absent</button>
            </div>
          </div>
        </div>
      </aside>

      <div class="content-area">
        <section class="editor-section">
          <input id="noteTitle" class="title-input" placeholder="Note Title (optional)" />
          <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
          
          <div class="input-grid">
            <input id="noteTags" placeholder="Tags (e.g. exam, lab)" />
            <input id="noteSubject" placeholder="Subject" />
            <select id="noteFolder">
              <option value="">No folder</option>
            </select>
          </div>

          <div class="editor-footer">
            <label><input type="checkbox" id="livePreviewToggle" /> Live preview</label>
            <button onclick="addNote()" class="primary-btn">Save Note</button>
          </div>
          <div id="livePreview" class="live-preview" style="display:none"></div>
        </section>

        <section class="search-section">
          <input id="searchInput" placeholder="Search notes..." />
          <select id="sortOrder" onchange="sortNotes()">
            <option value="" selected disabled>Sort by</option>
            <option value="asc">A-Z</option>
            <option value="desc">Z-A</option>
          </select>
          <label class="archive-filter">
            <input type="checkbox" id="showArchived" onchange="displayNotes()"> 
            Show Archived
          </label>
        </section>

        <div id="notesContainer" class="notes-grid"></div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
  <!-- Markdown renderer and sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

</body>
</html>
